# ──────────────────────────────────────────────────────────────────────────
# Ledger Sentinel — local one-command stack (single-origin).
#   docker compose up  →  http://localhost:8000   (dashboard + API, one service)
#
# Builds the EXACT image the Hugging Face Space runs (root Dockerfile), so local
# and prod are identical: one FastAPI process serves the vanilla-JS dashboard and
# the API from the same origin — no CORS, one URL. See DEPLOY.md.
#
# (In a horizontally-scaled deployment the same stateless image runs behind a
# load balancer; extraction fans out concurrently inside each replica. See
# ARCHITECTURE.md.)
# ──────────────────────────────────────────────────────────────────────────
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:7860"          # host 8000 → the container's app port (7860)
    # Boots to deterministic mock mode — no env needed. To gate the live
    # model-config panel, uncomment and set a token:
    # environment:
    #   - LEDGER_ADMIN_TOKEN=change-me
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
